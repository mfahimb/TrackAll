name: trackall_app
description: "TrackAll - Comprehensive tracking and management application for inventory, assets, and data entry."
publish_to: 'none'
version: 1.2.2+17

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  carousel_slider: ^4.2.0
  intl: ^0.19.0
  shared_preferences: ^2.5.3
  dropdown_search: ^6.0.3
  image_picker: ^1.1.2
  permission_handler: ^12.0.0
  camera: ^0.11.0
  path_provider: ^2.1.1
  mobile_scanner: ^6.0.0
  flutter_local_notifications: 17.2.4
  timezone: ^0.9.4
  android_intent_plus: ^6.0.0
  in_app_update: ^4.2.3
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 🔥 REQUIRED for app icon generation
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/trackall_icon.png
    - assets/icon/home_app.jpg
    - assets/icon/1691480144736.png

# 🔥 APP ICON CONFIG (ROOT LEVEL – NOT under flutter)
flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/trackall_icon.png
  adaptive_icon_background: "#E3F2FD"
  adaptive_icon_foreground: assets/icon/trackall_icon.png